<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Calorie Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 data-i18n="sidebarTitle">食物分类</h2>
          <p data-i18n="sidebarDesc">点击分类展开，点击食物自动填入。</p >
        </div>

        <div id="categoryList" class="category-list"></div>
      </aside>

      <section class="card">
        <div class="topbar">
          <div>
            <h1 data-i18n="title">食物热量计算器</h1>
            <p class="subtitle" data-i18n="subtitle">
              底层公式：实际摄入=食物重量×每100g营养数据÷100
            </p >
          </div>

          <button id="langToggle" class="lang-btn">English</button>
        </div>

        <div class="notice" data-i18n="notice">
          你现在接入的是本地热量数据库。支持英文搜索，也支持部分常见食物中文搜索，例如：鸡胸、鸡腿、鸡蛋、红薯、土豆、三文鱼。
        </div>

        <div class="form-section">
          <label for="searchInput" data-i18n="searchLabel">搜索食物</label>
          <input
            id="searchInput"
            type="text"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="例如：鸡胸 / chicken breast / potato / egg"
          />
          <div id="searchResults" class="search-results"></div>
        </div>

        <div class="form-grid">
          <div class="form-item">
            <label for="foodName" data-i18n="foodName">食物名称</label>
            <input id="foodName" type="text" data-i18n-placeholder="foodNamePlaceholder" placeholder="选择食物后自动填入" />
          </div>

          <div class="form-item">
            <label for="foodWeight" data-i18n="weight">重量(g)</label>
            <input id="foodWeight" type="number" placeholder="180" />
          </div>

          <div class="form-item">
            <label for="foodKcal" data-i18n="kcal100">每100g热量(kcal)</label>
            <input id="foodKcal" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodProtein" data-i18n="protein100">每100g蛋白质(g)</label>
            <input id="foodProtein" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodCarbs" data-i18n="carbs100">每100g碳水(g)</label>
            <input id="foodCarbs" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodFat" data-i18n="fat100">每100g脂肪(g)</label>
            <input id="foodFat" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodFiber" data-i18n="fiber100">每100g膳食纤维(g)</label>
            <input id="foodFiber" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>
        </div>

        <button id="addBtn" data-i18n="addFood">添加到今日饮食</button>

        <section class="summary">
          <div>
            <p data-i18n="totalKcal">总热量</p >
            <h2><span id="totalKcal">0</span>kcal</h2>
          </div>
          <div>
            <p data-i18n="protein">蛋白质</p >
            <h2><span id="totalProtein">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="carbs">碳水</p >
            <h2><span id="totalCarbs">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="fat">脂肪</p >
            <h2><span id="totalFat">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="fiber">纤维</p >
            <h2><span id="totalFiber">0</span>g</h2>
          </div>
        </section>

        <div class="table-header">
          <h3 data-i18n="todayList">今日饮食列表</h3>
          <button id="clearBtn" class="clear-btn" data-i18n="clearAll">清空全部</button>
        </div>

        <div id="foodList" class="food-list">
          <p class="empty" data-i18n="emptyList">还没有添加食物。</p >
        </div>
      </section>
    </section>
  </main>

  <script src="food-database.js"></script>
  <script src="app.js"></script>
</body>
</html>
