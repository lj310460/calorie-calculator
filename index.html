<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Calorie Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="layout single-layout">

      <section class="card">
        <div class="topbar">
          <div>
            <h1 data-i18n="title">食物热量计算器</h1>
            <p class="subtitle" data-i18n="subtitle">
              底层公式：实际摄入=食物重量×每100g营养数据÷100
            </p >
          </div>

        </div>

        <div class="topbar">
          <div>
            <h1 data-i18n="title">食物热量计算器</h1>
            <p class="subtitle" data-i18n="subtitle">
              底层公式：实际摄入=食物重量×每100g营养数据÷100
            </p >
          </div>
        
          <button id="langToggle" class="lang-btn">English</button>
        </div>
        
        <div class="notice" data-i18n="notice">
          当前使用完整本地食物数据库。支持中文搜索和英文搜索。常见食物会显示中文名，复杂食物保留英文原名。
        </div>
        
        <section class="plan-card">
          <div class="plan-header">
            <div>
              <h2>个人计划计算器</h2>
              <p>填写个人信息后，自动生成每日热量、三大营养素、饮食建议和训练安排。</p >
            </div>
          </div>
        
          <div class="plan-grid">
            <div class="plan-item">
              <label for="profileGender">性别</label>
              <select id="profileGender">
                <option value="male">男/Male</option>
                <option value="female">女/Female</option>
              </select>
            </div>
        
            <div class="plan-item">
              <label for="profileAge">年龄</label>
              <input id="profileAge" type="number" placeholder="例如：20" />
            </div>
        
            <div class="plan-item">
              <label for="profileHeight">身高(cm)</label>
              <input id="profileHeight" type="number" placeholder="例如：176" />
            </div>
        
            <div class="plan-item">
              <label for="profileWeight">体重(kg)</label>
              <input id="profileWeight" type="number" placeholder="例如：65" />
            </div>
        
            <div class="plan-item">
              <label for="profileGoal">目标</label>
              <select id="profileGoal">
                <option value="gain">增肌/Muscle gain</option>
                <option value="cut">减脂/Fat loss</option>
                <option value="maintain">保持现状/Maintain</option>
                <option value="longevity">养生抗衰/Longevity</option>
              </select>
            </div>
        
            <div class="plan-item">
              <label for="profileTraining">训练类型</label>
              <select id="profileTraining">
                <option value="strength">力量训练/Strength</option>
                <option value="bodybuilding">健美训练/Bodybuilding</option>
                <option value="functional">功能性训练/Functional</option>
              </select>
            </div>
        
            <div class="plan-item">
              <label for="profileDays">每周训练天数</label>
              <select id="profileDays">
                <option value="2">每周2天</option>
                <option value="3">每周3天</option>
                <option value="4">每周4天</option>
                <option value="5">每周5天</option>
                <option value="6">每周6天</option>
              </select>
            </div>
          </div>
        
          <button id="generatePlanBtn" class="plan-btn">生成我的计划</button>
        
          <div id="planResult" class="plan-result">
            <p class="plan-empty">填写信息后点击“生成我的计划”。</p >
          </div>
        </section>

        <div class="form-section">
          <label for="searchInput" data-i18n="searchLabel">搜索食物</label>
          <input
            id="searchInput"
            type="text"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="例如：鸡胸 / chicken breast / potato / egg"
          />
          <div id="searchResults" class="search-results"></div>
        </div>

        <div class="form-grid">
          <div class="form-item">
            <label for="foodName" data-i18n="foodName">食物名称</label>
            <input id="foodName" type="text" data-i18n-placeholder="foodNamePlaceholder" placeholder="选择食物后自动填入" />
          </div>

          <div class="form-item">
            <label for="foodWeight" data-i18n="weight">重量(g)</label>
            <input id="foodWeight" type="number" placeholder="180" />
          </div>

          <div class="form-item">
            <label for="foodKcal" data-i18n="kcal100">每100g热量(kcal)</label>
            <input id="foodKcal" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodProtein" data-i18n="protein100">每100g蛋白质(g)</label>
            <input id="foodProtein" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodCarbs" data-i18n="carbs100">每100g碳水(g)</label>
            <input id="foodCarbs" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodFat" data-i18n="fat100">每100g脂肪(g)</label>
            <input id="foodFat" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>

          <div class="form-item">
            <label for="foodFiber" data-i18n="fiber100">每100g膳食纤维(g)</label>
            <input id="foodFiber" type="number" data-i18n-placeholder="autoFill" placeholder="自动填入" />
          </div>
        </div>

        <button id="addBtn" data-i18n="addFood">添加到今日饮食</button>

        <section class="summary">
          <div>
            <p data-i18n="totalKcal">总热量</p >
            <h2><span id="totalKcal">0</span>kcal</h2>
          </div>
          <div>
            <p data-i18n="protein">蛋白质</p >
            <h2><span id="totalProtein">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="carbs">碳水</p >
            <h2><span id="totalCarbs">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="fat">脂肪</p >
            <h2><span id="totalFat">0</span>g</h2>
          </div>
          <div>
            <p data-i18n="fiber">纤维</p >
            <h2><span id="totalFiber">0</span>g</h2>
          </div>
        </section>

        <div class="table-header">
          <h3 data-i18n="todayList">今日饮食列表</h3>
          <button id="clearBtn" class="clear-btn" data-i18n="clearAll">清空全部</button>
        </div>

        <div id="foodList" class="food-list">
          <p class="empty" data-i18n="emptyList">还没有添加食物。</p >
        </div>
      </section>
    </section>
  </main>

  <script src="food-database.js"></script>
  <script src="app.js"></script>
</body>
</html>
